<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark maroon background -->
  <rect width="512" height="512" fill="#120608"/>

  <!-- Outer arch -->
  <!-- Semicircle center at (256, 272), radius 192 → top at y=80, sides down to y=476 -->
  <path d="M 64,476 L 64,272 A 192,192 0 0 1 448,272 L 448,476"
        fill="none" stroke="#F0E6DC" stroke-width="13" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Inner arch — same center, radius 156 (36px inset), sides also inset 36px -->
  <path d="M 100,476 L 100,272 A 156,156 0 0 1 412,272 L 412,476"
        fill="none" stroke="#F0E6DC" stroke-width="9" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Door handle: concentric circles, lower-right of door interior -->
  <circle cx="336" cy="390" r="20" fill="none" stroke="#F0E6DC" stroke-width="7"/>
  <circle cx="336" cy="390" r="7" fill="#F0E6DC"/>
</svg>
